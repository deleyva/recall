    <rect x="206" y="212" width="100" height="10" rx="5" fill="#c7d2fe"/>
    <rect x="206" y="238" width="110" height="10" rx="5" fill="#c7d2fe"/>
    <!-- Circular arrows -->
    <path d="M340 120 A130 130 0 0 1 400 256" stroke="white" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.7"/>
    <polygon points="405,240 415,268 388,260" fill="white" opacity="0.7"/>
