{{define "card_edit.html"}}
{{template "base" .}}
{{end}}

{{define "content"}}
<h1 class="text-2xl font-bold mb-6">Edit Card</h1>
<form method="POST" action="/decks/{{.DeckID}}/cards/{{.Card.ID}}" class="bg-white dark:bg-gray-800 shadow rounded-lg p-6 max-w-lg space-y-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Front</label>
        <textarea name="front" rows="3" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">{{.Card.Front}}</textarea>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Back</label>
        <textarea name="back" rows="3" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">{{.Card.Back}}</textarea>
    </div>
    <div class="flex gap-3">
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">Save</button>
        <a href="/decks/{{.DeckID}}/cards" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</a>
    </div>
</form>
{{end}}
