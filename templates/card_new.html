{{define "card_new.html"}}
{{template "base" .}}
{{end}}

{{define "content"}}
<h1 class="text-2xl font-bold mb-6">Add Card to {{.Deck.Name}}</h1>
<form method="POST" action="/decks/{{.Deck.ID}}/cards" class="bg-white dark:bg-gray-800 shadow rounded-lg p-6 max-w-lg space-y-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Front</label>
        <textarea name="front" rows="3" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500"></textarea>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Back</label>
        <textarea name="back" rows="3" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500"></textarea>
    </div>
    <div class="flex gap-3">
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">Add Card</button>
        <button type="submit" name="add_another" value="true" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">Add & Continue</button>
        <a href="/decks/{{.Deck.ID}}/cards" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</a>
    </div>
</form>
{{end}}
