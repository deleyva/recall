{{define "deck_new.html"}}
{{template "base" .}}
{{end}}

{{define "content"}}
<h1 class="text-2xl font-bold mb-6">New Deck</h1>
<form method="POST" action="/decks" class="bg-white dark:bg-gray-800 shadow rounded-lg p-6 max-w-lg space-y-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
        <input type="text" name="name" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea name="description" rows="3" class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500"></textarea>
    </div>
    <div class="flex gap-3">
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">Create Deck</button>
        <a href="/" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</a>
    </div>
</form>
{{end}}
