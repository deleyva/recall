{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} - {{end}}Recall</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Recall">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .text-green-700 ul, .text-gray-600 ul, .dark .text-green-400 ul, .dark .text-gray-300 ul { list-style-type: disc; padding-left: 1.5em; text-align: left; }
        .text-green-700 ol, .text-gray-600 ol, .dark .text-green-400 ol, .dark .text-gray-300 ol { list-style-type: decimal; padding-left: 1.5em; text-align: left; }
        .text-green-700 li, .text-gray-600 li, .dark .text-green-400 li, .dark .text-gray-300 li { margin-bottom: 0.25em; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { display: block; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors">
    {{if .Email}}
    <nav class="bg-indigo-600 dark:bg-indigo-900 text-white">
        <div class="max-w-5xl mx-auto px-4 py-3 flex flex-wrap justify-between items-center gap-2">
            <a href="/" class="text-xl font-bold shrink-0">Recall</a>
            <div class="flex items-center gap-3 text-sm sm:text-base">
                <a href="/to-read" class="hover:text-indigo-200">To Read</a>
                <a href="/playlists" class="hover:text-indigo-200">Playlists</a>
                {{if .IsAdmin}}<a href="/podcasts" class="hover:text-indigo-200">Podcasts</a>{{end}}
                <a href="/stats" class="hover:text-indigo-200">Stats</a>
                <a href="/profile" class="hover:text-indigo-200">Profile</a>
                <button onclick="toggleDarkMode()" class="hover:text-indigo-200" title="Toggle dark mode">
                    <span id="theme-icon-light" class="hidden dark:inline">&#x2600;</span>
                    <span id="theme-icon-dark" class="inline dark:hidden">&#x1f319;</span>
                </button>
                <span class="text-indigo-200 hidden sm:inline">{{.Email}}</span>
                <form action="/logout" method="POST" class="inline">
                    <button type="submit" class="hover:text-indigo-200">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    {{end}}
    <main class="max-w-5xl mx-auto px-4 py-8">
        {{template "content" .}}
    </main>
    <script>
        function toggleDarkMode() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
    </script>
</body>
</html>
{{end}}
