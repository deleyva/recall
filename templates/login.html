{{define "login.html"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recall</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
    <div class="w-full max-w-sm">
        <h1 class="text-3xl font-bold text-center mb-8">Recall</h1>
        {{if .Error}}<div class="bg-red-100 text-red-700 p-3 rounded mb-4">{{.Error}}</div>{{end}}
        <form method="POST" action="/login" class="bg-white dark:bg-gray-800 shadow rounded-lg p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Login</button>
        </form>
        <p class="text-center mt-4 text-gray-600">
            Don't have an account? <a href="/register" class="text-indigo-600 hover:underline">Register</a>
        </p>
    </div>
</body>
</html>
{{end}}
