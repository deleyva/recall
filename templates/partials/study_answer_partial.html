{{define "study_answer_partial.html"}}
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 text-center">
    <div class="text-lg font-medium mb-4">{{.Card.Front | safeHTML}}</div>
    <hr class="my-4">
    <div class="text-xl mb-8 min-h-[80px] text-green-700 text-left">
        {{.Card.Back | safeHTML}}
    </div>
    <!-- Edit / Delete actions -->
    <div class="flex justify-end gap-2 mb-4">
        <button
            hx-get="/decks/{{.DeckID}}/study/{{.Card.ID}}/edit"
            hx-target="#study-area"
            hx-swap="innerHTML"
            class="text-sm text-indigo-600 dark:text-indigo-400 hover:text-indigo-800 dark:hover:text-indigo-300 px-3 py-1 border border-indigo-300 dark:border-indigo-600 rounded">
            Edit
        </button>
        <button
            hx-delete="/decks/{{.DeckID}}/study/{{.Card.ID}}"
            hx-target="#study-area"
            hx-swap="innerHTML"
            hx-confirm="Delete this card? This cannot be undone."
            class="text-sm text-red-600 dark:text-red-400 hover:text-red-800 dark:hover:text-red-300 px-3 py-1 border border-red-300 dark:border-red-600 rounded">
            Delete
        </button>
    </div>

    <div class="grid grid-cols-4 gap-2">
        <form hx-post="/decks/{{.DeckID}}/study" hx-target="#study-area" hx-swap="innerHTML">
            <input type="hidden" name="card_id" value="{{.Card.ID}}">
            <input type="hidden" name="rating" value="1">
            <button type="submit" class="w-full bg-red-500 text-white px-3 py-3 rounded-lg hover:bg-red-600">
                <div class="font-medium">Again</div>
                <div class="text-xs opacity-80">{{index .Intervals 1}}</div>
            </button>
        </form>
        <form hx-post="/decks/{{.DeckID}}/study" hx-target="#study-area" hx-swap="innerHTML">
            <input type="hidden" name="card_id" value="{{.Card.ID}}">
            <input type="hidden" name="rating" value="2">
            <button type="submit" class="w-full bg-orange-500 text-white px-3 py-3 rounded-lg hover:bg-orange-600">
                <div class="font-medium">Hard</div>
                <div class="text-xs opacity-80">{{index .Intervals 2}}</div>
            </button>
        </form>
        <form hx-post="/decks/{{.DeckID}}/study" hx-target="#study-area" hx-swap="innerHTML">
            <input type="hidden" name="card_id" value="{{.Card.ID}}">
            <input type="hidden" name="rating" value="3">
            <button type="submit" class="w-full bg-green-500 text-white px-3 py-3 rounded-lg hover:bg-green-600">
                <div class="font-medium">Good</div>
                <div class="text-xs opacity-80">{{index .Intervals 3}}</div>
            </button>
        </form>
        <form hx-post="/decks/{{.DeckID}}/study" hx-target="#study-area" hx-swap="innerHTML">
            <input type="hidden" name="card_id" value="{{.Card.ID}}">
            <input type="hidden" name="rating" value="4">
            <button type="submit" class="w-full bg-blue-500 text-white px-3 py-3 rounded-lg hover:bg-blue-600">
                <div class="font-medium">Easy</div>
                <div class="text-xs opacity-80">{{index .Intervals 4}}</div>
            </button>
        </form>
    </div>
</div>
{{end}}
