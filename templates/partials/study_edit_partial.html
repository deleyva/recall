{{define "study_edit_partial.html"}}
<div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8">
    <h3 class="text-lg font-medium mb-4">Edit Card</h3>
    <form hx-put="/decks/{{.DeckID}}/study/{{.Card.ID}}"
          hx-target="#study-area"
          hx-swap="innerHTML">
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Front</label>
            <textarea name="front" rows="3"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            >{{.Card.Front}}</textarea>
        </div>
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Back</label>
            <textarea name="back" rows="5"
                class="w-full border border-gray-300 dark:border-gray-600 rounded-lg px-3 py-2 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            >{{.Card.Back}}</textarea>
        </div>
        <div class="flex justify-end gap-2">
            <button type="button"
                hx-get="/decks/{{.DeckID}}/study/{{.Card.ID}}/answer"
                hx-target="#study-area"
                hx-swap="innerHTML"
                class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                Cancel
            </button>
            <button type="submit"
                class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                Save
            </button>
        </div>
    </form>
</div>
{{end}}
